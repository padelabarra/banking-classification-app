<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Dashboard</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f0f4ff;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 2px 8px rgba(37, 99, 235, 0.08);
      --shadow-hover: 0 8px 24px rgba(37, 99, 235, 0.16);
      --radius: 12px;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(37, 99, 235, 0.3);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header h1 span {
      opacity: 0.7;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #btn-dark-mode {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 0.65rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
      line-height: 1;
    }

    #btn-dark-mode:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    #btn-add {
      background: #fff;
      color: var(--primary);
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    #btn-add:hover {
      background: #e0e7ff;
      transform: translateY(-1px);
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      padding: 1.25rem 2rem;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    #search {
      flex: 1;
      min-width: 180px;
      padding: 0.5rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s, background 0.2s, color 0.2s;
    }

    #search:focus {
      border-color: var(--primary);
    }

    #filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filter-btn {
      padding: 0.4rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: transparent;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-muted);
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      padding: 1.75rem 2rem;
    }

    #empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
    }

    #empty-state p {
      font-size: 1.1rem;
      margin-top: 0.5rem;
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: box-shadow 0.2s, transform 0.2s, background 0.2s;
      position: relative;
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .card-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
    }

    .card-title a {
      color: var(--text);
      text-decoration: none;
    }

    .card-title a:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    .card-url {
      font-size: 0.78rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      background: #e0e7ff;
      color: var(--primary-dark);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      width: fit-content;
    }

    [data-theme="dark"] .card-badge {
      background: #1e3a5f;
      color: #93c5fd;
    }

    .card-notes {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
    }

    .card-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .card-actions {
      display: flex;
      gap: 0.25rem;
    }

    .btn-edit,
    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0.25rem 0.35rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .btn-edit {
      color: #cbd5e1;
    }

    .btn-edit:hover {
      color: var(--primary);
      background: #e0e7ff;
    }

    [data-theme="dark"] .btn-edit:hover {
      background: #1e3a5f;
    }

    .btn-delete {
      color: #cbd5e1;
    }

    .btn-delete:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    [data-theme="dark"] .btn-delete:hover {
      background: #3b1111;
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.open {
      display: flex;
    }

    #modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 460px;
      margin: 1rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      animation: slide-up 0.2s ease;
      transition: background 0.2s;
    }

    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #modal h2 {
      font-size: 1.25rem;
      margin-bottom: 1.25rem;
      color: var(--text);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .form-group input,
    .form-group textarea {
      padding: 0.55rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s, background 0.2s, color 0.2s;
      resize: vertical;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
      margin-top: 1.25rem;
    }

    .btn-cancel {
      padding: 0.55rem 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-cancel:hover {
      background: var(--bg);
    }

    .btn-save {
      padding: 0.55rem 1.3rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-save:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      header {
        padding: 1rem;
        gap: 0.75rem;
      }

      header h1 {
        font-size: 1.15rem;
      }

      #toolbar {
        padding: 1rem;
        flex-direction: column;
        align-items: stretch;
      }

      #search {
        width: 100%;
      }

      #grid {
        grid-template-columns: 1fr;
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Bookmarks <span>Dashboard</span></h1>
    <div class="header-actions">
      <button id="btn-dark-mode" title="Toggle dark mode">🌙</button>
      <button id="btn-add">+ Add Bookmark</button>
    </div>
  </header>

  <!-- Toolbar -->
  <div id="toolbar">
    <input type="search" id="search" placeholder="Search bookmarks…" autocomplete="off" />
    <div id="filters"></div>
  </div>

  <!-- Grid -->
  <main id="grid"></main>

  <!-- Modal -->
  <div id="modal-overlay">
    <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">Add Bookmark</h2>
      <form id="bookmark-form" novalidate>
        <div class="form-group">
          <label for="f-title">Title *</label>
          <input type="text" id="f-title" placeholder="My Awesome Site" required />
        </div>
        <div class="form-group">
          <label for="f-url">URL *</label>
          <input type="url" id="f-url" placeholder="https://example.com" required />
        </div>
        <div class="form-group">
          <label for="f-category">Category *</label>
          <input type="text" id="f-category" placeholder="e.g. Dev Tools, Reading…" required />
        </div>
        <div class="form-group">
          <label for="f-notes">Notes</label>
          <textarea id="f-notes" rows="3" placeholder="Optional notes…"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-save" id="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────
    const STORAGE_KEY      = 'bookmarks';
    const DARK_MODE_KEY    = 'darkMode';

    const SAMPLE_BOOKMARKS = [
      {
        id: uid(), title: 'MDN Web Docs',
        url: 'https://developer.mozilla.org',
        category: 'Dev Tools',
        notes: 'The definitive reference for HTML, CSS, and JavaScript APIs.',
        createdAt: new Date().toISOString()
      },
      {
        id: uid(), title: 'GitHub',
        url: 'https://github.com',
        category: 'Dev Tools',
        notes: 'Code hosting, version control, and collaboration.',
        createdAt: new Date().toISOString()
      },
      {
        id: uid(), title: 'CSS-Tricks',
        url: 'https://css-tricks.com',
        category: 'Dev Tools',
        notes: 'Tips, tricks, and techniques for CSS and frontend development.',
        createdAt: new Date().toISOString()
      },
      {
        id: uid(), title: 'Hacker News',
        url: 'https://news.ycombinator.com',
        category: 'News',
        notes: 'Tech and startup news aggregator.',
        createdAt: new Date().toISOString()
      },
      {
        id: uid(), title: 'The Verge',
        url: 'https://theverge.com',
        category: 'News',
        notes: 'Technology, science, entertainment and culture news.',
        createdAt: new Date().toISOString()
      },
      {
        id: uid(), title: 'Figma',
        url: 'https://figma.com',
        category: 'Design',
        notes: 'Collaborative interface design tool.',
        createdAt: new Date().toISOString()
      },
      {
        id: uid(), title: 'Dribbble',
        url: 'https://dribbble.com',
        category: 'Design',
        notes: 'Design inspiration and portfolio showcase platform.',
        createdAt: new Date().toISOString()
      },
      {
        id: uid(), title: 'Pocket',
        url: 'https://getpocket.com',
        category: 'Reading',
        notes: 'Save articles and videos to read/watch later.',
        createdAt: new Date().toISOString()
      }
    ];

    // ── Utilities ──────────────────────────────────────────
    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function getDomain(url) {
      try { return new URL(url).hostname; }
      catch { return ''; }
    }

    function faviconUrl(url) {
      const domain = getDomain(url);
      return domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=32` : '';
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Data Layer ─────────────────────────────────────────
    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function save(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function initBookmarks() {
      let data = load();
      if (!data) {
        data = SAMPLE_BOOKMARKS;
        save(data);
      }
      return data;
    }

    // ── State ──────────────────────────────────────────────
    let bookmarks     = initBookmarks();
    let searchQuery   = '';
    let activeCategory = 'All';
    let editingId     = null;   // null = add mode, string = edit mode

    // ── Dark Mode ──────────────────────────────────────────
    const btnDark = document.getElementById('btn-dark-mode');

    function applyTheme(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      btnDark.textContent = dark ? '☀️' : '🌙';
      btnDark.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
    }

    function initDarkMode() {
      const saved = localStorage.getItem(DARK_MODE_KEY);
      // Also respect OS preference on first visit
      const prefersDark = saved !== null
        ? saved === 'true'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark);
    }

    btnDark.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      applyTheme(!isDark);
      localStorage.setItem(DARK_MODE_KEY, String(!isDark));
    });

    // ── Filter Logic ───────────────────────────────────────
    function filtered() {
      const q = searchQuery.toLowerCase();
      return bookmarks.filter(b => {
        const matchSearch = !q ||
          b.title.toLowerCase().includes(q) ||
          b.category.toLowerCase().includes(q) ||
          (b.notes && b.notes.toLowerCase().includes(q));
        const matchCat = activeCategory === 'All' || b.category === activeCategory;
        return matchSearch && matchCat;
      });
    }

    // ── Render ─────────────────────────────────────────────
    function render() {
      renderFilters();
      renderGrid();
    }

    function renderFilters() {
      const categories = ['All', ...new Set(bookmarks.map(b => b.category))];
      const container = document.getElementById('filters');
      container.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn' + (cat === activeCategory ? ' active' : '');
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          activeCategory = cat;
          render();
        });
        container.appendChild(btn);
      });
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      const items = filtered();
      grid.innerHTML = '';

      if (items.length === 0) {
        const empty = document.createElement('div');
        empty.id = 'empty-state';
        empty.innerHTML = '<p>No bookmarks found.</p>';
        grid.appendChild(empty);
        return;
      }

      items.forEach(b => grid.appendChild(createCard(b)));
    }

    function createCard(b) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = b.id;

      const favicon = faviconUrl(b.url);
      const domain  = getDomain(b.url);

      card.innerHTML = `
        <div class="card-header">
          ${favicon ? `<img class="card-favicon" src="${favicon}" alt="" onerror="this.style.display='none'" />` : ''}
          <div class="card-title">
            <a href="${escHtml(b.url)}" target="_blank" rel="noopener noreferrer">${escHtml(b.title)}</a>
          </div>
        </div>
        <div class="card-url">${escHtml(domain)}</div>
        <span class="card-badge">${escHtml(b.category)}</span>
        ${b.notes ? `<p class="card-notes">${escHtml(b.notes)}</p>` : ''}
        <div class="card-footer">
          <span class="card-date">${formatDate(b.createdAt)}</span>
          <div class="card-actions">
            <button class="btn-edit" title="Edit bookmark" data-id="${b.id}">✏️</button>
            <button class="btn-delete" title="Delete bookmark" data-id="${b.id}">🗑️</button>
          </div>
        </div>
      `;

      card.querySelector('.btn-edit').addEventListener('click', () => openModal(b.id));
      card.querySelector('.btn-delete').addEventListener('click', () => deleteBookmark(b.id));
      return card;
    }

    // ── CRUD ───────────────────────────────────────────────
    function addBookmark(data) {
      bookmarks = [{
        id: uid(),
        title: data.title,
        url: data.url,
        category: data.category,
        notes: data.notes,
        createdAt: new Date().toISOString()
      }, ...bookmarks];
      save(bookmarks);
      render();
    }

    function updateBookmark(id, data) {
      bookmarks = bookmarks.map(b =>
        b.id === id ? { ...b, title: data.title, url: data.url, category: data.category, notes: data.notes } : b
      );
      save(bookmarks);
      render();
    }

    function deleteBookmark(id) {
      bookmarks = bookmarks.filter(b => b.id !== id);
      save(bookmarks);
      render();
    }

    // ── Modal ──────────────────────────────────────────────
    const overlay  = document.getElementById('modal-overlay');
    const form     = document.getElementById('bookmark-form');
    const modalTitle = document.getElementById('modal-title');
    const btnSave  = document.getElementById('btn-save');

    function openModal(id = null) {
      editingId = id;
      form.reset();

      if (id) {
        const b = bookmarks.find(x => x.id === id);
        if (!b) return;
        document.getElementById('f-title').value    = b.title;
        document.getElementById('f-url').value      = b.url;
        document.getElementById('f-category').value = b.category;
        document.getElementById('f-notes').value    = b.notes || '';
        modalTitle.textContent = 'Edit Bookmark';
        btnSave.textContent    = 'Update';
      } else {
        modalTitle.textContent = 'Add Bookmark';
        btnSave.textContent    = 'Save';
      }

      overlay.classList.add('open');
      document.getElementById('f-title').focus();
    }

    function closeModal() {
      overlay.classList.remove('open');
      editingId = null;
    }

    document.getElementById('btn-add').addEventListener('click', () => openModal());
    document.getElementById('btn-cancel').addEventListener('click', closeModal);

    overlay.addEventListener('click', e => {
      if (e.target === overlay) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    form.addEventListener('submit', e => {
      e.preventDefault();
      const title    = document.getElementById('f-title').value.trim();
      const rawUrl   = document.getElementById('f-url').value.trim();
      const category = document.getElementById('f-category').value.trim();
      const notes    = document.getElementById('f-notes').value.trim();

      if (!title || !rawUrl || !category) return;

      const url = rawUrl.startsWith('http://') || rawUrl.startsWith('https://') ? rawUrl : 'https://' + rawUrl;

      if (editingId) {
        updateBookmark(editingId, { title, url, category, notes });
      } else {
        addBookmark({ title, url, category, notes });
      }
      closeModal();
    });

    // ── Search ─────────────────────────────────────────────
    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderGrid();
    });

    // ── Boot ───────────────────────────────────────────────
    initDarkMode();
    render();
  </script>
</body>
</html>
